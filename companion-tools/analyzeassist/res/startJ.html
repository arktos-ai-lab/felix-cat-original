<H1><font face="Century Gothic" color="#10458d">AnalyzeAssist &ndash; はじめに</font></H1>

<H3><font face="Trebuchet MS" color="#555555">ファイルの解析</font></H3>

<P><font face="Trebuchet MS" color="#555555">ファイルを解析するには、メニューから「ファイル」 &gt;&gt; 「解析」を選択してください。
    あるいは、<A href="#on_analyze"><font color="#4D87CE"><b>ここをクリックしてください</b></font></A>。 </font></P>

<H3><font face="Trebuchet MS" color="#555555">オプションの設定</font></H3>

<P><font face="Trebuchet MS" color="#555555">オプションを設定するには、メニューから「ツール」 &gt;&gt; 「オプション」を選択してください。
    あるいは、<A href="#on_options"><font color="#4D87CE"><b>ここをクリックしてください</b></font></A>。</font></P>

<H3><font face="Trebuchet MS" color="#555555">使い方について</font></H3>

<P><font face="Trebuchet MS" color="#555555">使い方の詳しい説明を表示するには、「ヘルプ」メニューのコマンドを利用してください。
    あるいは、<A href="#on_help"><font color="#4D87CE"><b>ここをクリックしてください</b></font></A>。 </font></P>
