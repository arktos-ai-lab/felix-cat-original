<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <link href="css/style.css" rel="stylesheet" type="text/css"/>

    <title>{% block title %}Analyze Assist - Free Word Count Tool for Windows{% endblock %}</title>
    <link rel="shortcut icon" href="/favicon.ico" type="image/vnd.microsoft.icon"/>
    <link rel="icon" href="/favicon.ico" type="image/vnd.microsoft.icon"/>
    <meta http-equiv="Content-Type" content="application/xhtml+xml; charset=utf-8"/>

    <meta name="resource-type" content="document"/>
    <meta name="classification" content="Software"/>
    <meta name="description"
          content="{% block description %}Analyze Assist: A free tool for windows to get word counts from many different file formats{% endblock %}"/>
    <meta name="MSSmartTagsPreventParsing" content="TRUE"/>
    <meta name="keywords"
          content="{% block keywords %}wordcount, count, words, characters, kanji, asian, double-byte, Word, Excel, PowerPoint, HTML, XML, free, manual, help{% endblock %}"/>

    <meta name="distribution" content="Global"/>
    <meta name="rating" content="Safe For Kids"/>
    <meta name="copyright" content="Copyright Ginstrom IT Solutions (GITS)"/>
    <meta name="author" content="Ryan Ginstrom"/>
    <meta name="language" content="English"/>
    <meta name="doc-class" content="Completed"/>
    <meta name="doc-rights" content="Copyrighted Work"/>
</head>

<body>
<div id="container">
    <div id="header">
        <p>Analyze Assist Help</p>
    </div>

    <div id="body">
        {% block content %}{% endblock %}
    </div>
    <br clear="all"/></div>

<div id="footer">
    <div>
        <div>
            Copyright &copy; Ginstrom IT Solutions (GITS).
            | <a href="http://ginstrom.com/AnalyzeAssist/" title="Analyze Assist home">Analyze Assist Home</a>
            | <a href="http://ginstrom.com/" title="GITS Home">GITS Home</a>
            | <a href="http://felix-cat.com/" title="Felix the CAT tool">Felix Home</a>
        </div>
    </div>
</div>

<script src="http://www.google-analytics.com/urchin.js" type="text/javascript">
</script>

    _uacct = "UA-2546149-1";
    urchinTracker();
</script>
</body>
</html>
